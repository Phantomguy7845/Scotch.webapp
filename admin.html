<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scotch webapps1 | Admin Approval</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="adminLoginOverlay" class="admin-login-overlay">
      <section class="admin-login-card" role="dialog" aria-modal="true" aria-labelledby="adminLoginTitle">
        <p class="hero-kicker">Scotch Fleet Service</p>
        <h2 id="adminLoginTitle">Admin Login</h2>
        <p class="admin-login-copy">
          Sign in with <strong>admin_Name</strong> and <strong>admin_Pass</strong> from the
          <strong>Admin</strong> sheet.
        </p>
        <div class="form-stack">
          <label>
            <span>Admin name *</span>
            <input id="adminLoginNameInput" type="text" autocomplete="username" />
          </label>
          <label>
            <span>Password *</span>
            <input id="adminLoginPassInput" type="password" autocomplete="current-password" />
          </label>
          <button id="adminLoginBtn" type="button">เข้าสู่ระบบแอดมิน</button>
          <p id="adminLoginMessage" class="form-message" aria-live="polite"></p>
        </div>
      </section>
    </div>

    <main class="page page-admin">
      <section class="hero hero-compact admin-hero">
        <div class="admin-corner-chip">
          <span>Admin</span>
          <strong id="adminNameLabel">-</strong>
        </div>
        <p class="hero-kicker">Scotch Fleet Service</p>
        <h1>Admin Approval Console</h1>
        <p class="hero-copy">
          Review pending vehicle requests, then approve or reject. The system sends an email result
          to the requester automatically.
        </p>
      </section>

      <section class="card admin-tools">
        <div class="admin-actions">
          <button id="refreshBtn" type="button" class="button-secondary">Refresh requests</button>
          <button id="logoutAdminBtn" type="button" class="button-secondary">ออกจากโหมดแอดมิน</button>
          <p id="adminMessage" class="form-message" aria-live="polite"></p>
        </div>
      </section>

      <section class="card admin-list-wrap">
        <div class="list-head">
          <h2>Requests</h2>
          <p id="requestCount">0 records</p>
        </div>
        <div id="requestList" class="request-list"></div>
      </section>
    </main>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/admin.js"></script>
  </body>
</html>
